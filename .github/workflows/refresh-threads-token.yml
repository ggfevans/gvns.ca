name: Refresh Threads Token

on:
  schedule:
    - cron: "0 12 1,15 * *" # 1st and 15th of each month at noon UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          # The script authenticates gh with GH_PAT and never runs git — no
          # need to persist GITHUB_TOKEN into .git/config.
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"

      # Refreshes unconditionally on every scheduled run — the previous inline
      # implementation skipped when >30 days remained on the token, but an
      # unconditional twice-monthly refresh is simpler and well within Meta's
      # limits. The script is dependency-free (native fetch + gh CLI), so no
      # npm ci. On failure it opens/comments on a dedup'd "[threads-auth] …"
      # issue itself — no separate create-issue step needed.
      - name: Refresh token and persist secret
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          # GH_PAT needs Secrets: read/write (to update THREADS_ACCESS_TOKEN)
          # and Issues: read/write (failure reporting) — run verify-pat.yml
          # to confirm.
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/refresh-threads-token.mjs
