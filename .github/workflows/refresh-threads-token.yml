# Refreshes the long-lived Threads access token weekly and writes the new
# value back to the THREADS_ACCESS_TOKEN repo secret. See Phase A.6 of
# docs/plans/2026-04-25-threads-comments-plan.md.
#
# Required repository secrets:
#   THREADS_ACCESS_TOKEN  — current long-lived token (read here, rewritten on success)
#   GH_PAT                — token used by the gh CLI to update the secret and
#                           open issues on failure (needs `repo` scope on classic
#                           PATs, or `Secrets: read/write` + `Issues: read/write`
#                           + `Contents: read` on fine-grained)

name: Refresh Threads Token

on:
  schedule:
    # Mondays at 06:00 UTC. Weekly cadence gives ~8 retry windows before the
    # 60-day token would actually expire — much more resilient than monthly.
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write   # for opening/commenting on the failure issue

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: ".nvmrc"

      - name: Refresh token and update secret
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: node scripts/refresh-threads-token.mjs
