name: Fetch Threads Feed

on:
  schedule:
    - cron: "15 * * * *" # hourly, offset 15min from fetch-comments
  workflow_dispatch:

concurrency:
  group: fetch-threads-feed
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Fetch threads feed (smart short-circuit inside script)
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: node scripts/fetch-threads-feed.mjs

      - name: Commit via PR (no-op if no diff)
        uses: ./.github/actions/commit-via-pr
        with:
          commit-message: "chore: update threads feed"
          branch-prefix: update-threads-feed
          github-token: ${{ secrets.GH_PAT }}
