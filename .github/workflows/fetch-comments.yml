name: Fetch Comments

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

concurrency:
  group: fetch-comments
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ github.token }}
          persist-credentials: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Fetch Threads replies
        env:
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: node scripts/fetch-comments.mjs

      - uses: ./.github/actions/commit-via-pr
        with:
          paths: src/data/comments/
          commit-message: "chore: update comment data"
          branch-prefix: update-comments
          github-token: ${{ github.token }}
