# Weekly CSP coverage check against production (read-only GETs/HEADs).
# Standalone on purpose — a CSP regression shouldn't be conflated with
# fetcher failures. GitHub's default workflow-failure email is the alert.
name: Verify CSP

on:
  schedule:
    - cron: "30 6 * * 1" # Mondays at 06:30 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Read-only HTTP checks — no git creds needed in the workspace.
          persist-credentials: false

      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: "24"

      - name: Verify production CSP headers
        run: node scripts/verify-csp.mjs https://gvns.ca
