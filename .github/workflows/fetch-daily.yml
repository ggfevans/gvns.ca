name: Fetch Daily

on:
  schedule:
    - cron: "0 3 * * *" # Daily at 03:00 UTC (off-peak, single window)
  workflow_dispatch:

concurrency:
  group: fetch-daily
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ github.token }}
          persist-credentials: false

      - id: gaming
        name: Fetch Steam data
        continue-on-error: true
        uses: ./.github/actions/fetch-steam
        with:
          steam_api_key: ${{ secrets.STEAM_API_KEY }}
          steam_id: "76561197962113454"
          output_path: src/data/gaming.json
          recent_count: "10"
          daily_log_days: "90"

      - id: github
        name: Fetch GitHub activity
        continue-on-error: true
        uses: ./.github/actions/fetch-github
        with:
          username: ${{ github.repository_owner }}
          token: ${{ secrets.GH_PAT }}
          output-path: src/data/github.json

      - id: listening
        name: Fetch ListenBrainz data
        continue-on-error: true
        uses: ./.github/actions/fetch-listenbrainz
        with:
          username: ${{ secrets.LISTENBRAINZ_USERNAME }}
          output_path: src/data/listening.json
          stats_range: this_month
          top_count: "10"
          recent_count: "10"

      - id: reading
        name: Fetch Hardcover data
        continue-on-error: true
        uses: ./.github/actions/fetch-hardcover
        with:
          token: ${{ secrets.HARDCOVER_TOKEN }}
          user_id: ${{ secrets.HARDCOVER_USER_ID }}
          output_path: src/data/reading.json

      - id: watching
        name: Fetch Trakt data
        continue-on-error: true
        uses: ./.github/actions/fetch-trakt
        with:
          trakt_client_id: ${{ secrets.TRAKT_CLIENT_ID }}
          trakt_username: "gvns"
          tmdb_api_key: ${{ secrets.TMDB_API_KEY }}
          output_path: src/data/watching.json

      - id: whoop
        name: Fetch Whoop data
        continue-on-error: true
        env:
          WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_REFRESH_TOKEN: ${{ secrets.WHOOP_REFRESH_TOKEN }}
          # GH_PAT (fine-grained, repo Secrets: read/write) is required so
          # the script can persist rotated refresh + access tokens back to
          # secrets — see scripts/fetch-whoop.mjs preamble (§4.4 of the spec).
          GH_TOKEN: ${{ secrets.GH_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/fetch-whoop.mjs

      - name: Commit and open PR
        if: always()
        uses: ./.github/actions/commit-via-pr
        with:
          paths: src/data/
          commit-message: "chore: update daily fetch data"
          branch-prefix: update-daily
          github-token: ${{ github.token }}

      - name: Fail run if any fetcher failed
        if: always()
        run: |
          declare -A outcomes=(
            [gaming]="${{ steps.gaming.outcome }}"
            [github]="${{ steps.github.outcome }}"
            [listening]="${{ steps.listening.outcome }}"
            [reading]="${{ steps.reading.outcome }}"
            [watching]="${{ steps.watching.outcome }}"
            [whoop]="${{ steps.whoop.outcome }}"
          )
          {
            echo "### Fetch outcomes"
            for k in "${!outcomes[@]}"; do
              echo "- $k: ${outcomes[$k]}"
            done
          } >> "$GITHUB_STEP_SUMMARY"
          failed=()
          for k in "${!outcomes[@]}"; do
            [ "${outcomes[$k]}" = "failure" ] && failed+=("$k")
          done
          if [ ${#failed[@]} -gt 0 ]; then
            echo "Failed fetchers: ${failed[*]}" >&2
            exit 1
          fi
