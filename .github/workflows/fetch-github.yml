name: Fetch GitHub Data

on:
  schedule:
    - cron: "17 3 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Fetch GitHub activity
        uses: ggfevans/github-json-bourne@344e0c014a458ef1612051454fa5a046653d4c3b
        with:
          username: ${{ github.repository_owner }}
          token: ${{ secrets.GH_PAT }}
          output-path: src/data/github.json

      - uses: ./.github/actions/commit-via-pr
        with:
          paths: src/data/github.json
          commit-message: "chore: update github activity data"
          branch-prefix: update-github
          github-token: ${{ secrets.GH_PAT }}
