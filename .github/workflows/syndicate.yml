# POSSE syndication workflow — cross-posts new writing to Bluesky, Mastodon, and Threads.
#
# Required repository secrets:
#   BLUESKY_HANDLE        — Bluesky handle (e.g. gvns.ca)
#   BLUESKY_APP_PASSWORD  — App Password from Bluesky settings
#   MASTODON_INSTANCE     — Mastodon instance URL (e.g. https://mastodon.social)
#   MASTODON_TOKEN        — Access token from Mastodon app settings
#   THREADS_USER_ID       — Threads user ID (from developer portal)
#   THREADS_ACCESS_TOKEN  — Long-lived Threads access token (refreshed by refresh-threads-token.yml)

name: Syndicate Writing

on:
  push:
    branches: [main]
    paths:
      - "src/content/writing/**"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  syndicate:
    # Skip when this run was triggered by the syndicate workflow's own merge to
    # main (commit message comes from the PR title set by the composite action).
    # The `|| ''` fallback keeps workflow_dispatch runs working — head_commit
    # is undefined for that event.
    if: "${{ !startsWith(github.event.head_commit.message || '', 'chore: update syndication data') }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: npm

      - run: npm ci

      - name: Run syndication script
        env:
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          MASTODON_INSTANCE: ${{ secrets.MASTODON_INSTANCE }}
          MASTODON_TOKEN: ${{ secrets.MASTODON_TOKEN }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: node scripts/syndicate.mjs

      - uses: ./.github/actions/commit-via-pr
        with:
          paths: src/content/writing/
          commit-message: "chore: update syndication data"
          branch-prefix: update-syndication
          github-token: ${{ secrets.GH_PAT }}
