# One-shot diagnostic — run via Actions tab → "Verify PAT" → "Run workflow".
# Confirms that GH_PAT has the scopes/permissions the automated workflows need:
#   - Classic PAT: `repo` scope is sufficient
#   - Fine-grained PAT needs:
#       Contents: read/write       — checkout + commit-via-pr branch pushes
#       Pull requests: read/write  — commit-via-pr opens/merges PRs
#       Secrets: read/write        — fetch-whoop.mjs / refresh-threads-token.mjs
#                                    persist rotated tokens via `gh secret set`
#       Issues: read/write         — failure reporting (`gh issue list/create/comment`)
#
# Safe to keep around, but feel free to delete once verified.

name: Verify PAT

permissions:
  contents: read

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Inspect token scopes / permissions
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "=== Authenticated as ==="
          gh api user --jq '.login'
          echo

          echo "=== Token scopes (classic PAT) — look for X-Oauth-Scopes header ==="
          # `gh api -i` prints response headers. Classic PATs surface scopes in
          # `X-Oauth-Scopes`; fine-grained PATs return an empty header.
          gh api -i user 2>&1 | grep -iE '^x-(oauth|accepted-oauth)-scopes:' || echo "(no scope headers — likely a fine-grained PAT)"
          echo

          echo "=== Repo-level permissions check ==="
          # If this returns 'true' for both, fine-grained PATs are wired correctly.
          gh api "repos/${GITHUB_REPOSITORY}" --jq '{push: .permissions.push, admin: .permissions.admin, pull: .permissions.pull}'
          echo

          echo "=== Probe: can the token list PRs? ==="
          gh pr list --repo "$GITHUB_REPOSITORY" --limit 1 --state all --json number,title >/dev/null && echo "OK — PR read works"
          echo

          echo "=== Probe: can the token resolve auto-merge prerequisites? ==="
          # If allow_auto_merge isn't enabled on the repo, gh pr merge --auto fails.
          gh api "repos/${GITHUB_REPOSITORY}" --jq '{allow_auto_merge: .allow_auto_merge, delete_branch_on_merge: .delete_branch_on_merge}'

      - name: Probe secrets write
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "=== Probe: can the token write repo secrets? ==="
          # Set + delete a throwaway secret — proves Secrets: read/write, which
          # fetch-whoop.mjs and refresh-threads-token.mjs rely on.
          printf ok | gh secret set VERIFY_PAT_PROBE --repo "$GITHUB_REPOSITORY" && gh secret delete VERIFY_PAT_PROBE --repo "$GITHUB_REPOSITORY" && echo "OK — secrets write works"

      - name: Probe issues access
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "=== Probe: can the token list issues? ==="
          # The failure reporters (`[threads-auth] …`, `[whoop-auth] …`) need
          # Issues: read/write; listing proves the Issues permission is granted.
          gh issue list --repo "$GITHUB_REPOSITORY" --limit 1 --state all --json number,title >/dev/null && echo "OK — issue read works"
