name: Fetch Reading Data

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Fetch reading data
        uses: ggfevans/hardcover-github-action@f68d44fb791e471a33a52f04f61052faa8654cb4 # v1
        with:
          token: ${{ secrets.HARDCOVER_TOKEN }}
          user_id: ${{ secrets.HARDCOVER_USER_ID }}
          output_path: src/data/reading.json

      - uses: ./.github/actions/commit-via-pr
        with:
          paths: src/data/reading.json
          commit-message: "chore: update reading data"
          branch-prefix: update-reading
          github-token: ${{ secrets.GH_PAT }}
