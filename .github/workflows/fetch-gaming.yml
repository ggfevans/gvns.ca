name: Fetch Gaming Data

on:
  schedule:
    - cron: '42 3 * * *' # Daily at 03:42 UTC (off-peak, staggered from other fetches)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GH_PAT }}

      # steam-json-bourne commits the data file itself when skip_commit is
      # 'false'. The composite action below detects the local commit via
      # `git rev-list origin/main..HEAD` and routes it through a PR.
      - uses: ggfevans/steam-json-bourne@16a0ad5ed045d350a175d124c5100ff14c388a6a # main
        with:
          steam_api_key: ${{ secrets.STEAM_API_KEY }}
          steam_id: '76561197962113454'
          output_path: src/data/gaming.json
          recent_count: '10'
          daily_log_days: '90'
          skip_commit: 'false'

      - uses: ./.github/actions/commit-via-pr
        with:
          commit-message: "chore: update gaming data"
          branch-prefix: update-gaming
          github-token: ${{ secrets.GH_PAT }}
