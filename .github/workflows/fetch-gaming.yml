name: Fetch Gaming Data

on:
  schedule:
    - cron: '42 3 * * *' # Daily at 03:42 UTC (off-peak, staggered from other fetches)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: ggfevans/steam-json-bourne@main # pin to commit SHA after first release
        with:
          steam_api_key: ${{ secrets.STEAM_API_KEY }}
          steam_id: '76561197962113454'
          output_path: src/data/gaming.json
          recent_count: '10'
          daily_log_days: '90'
          skip_commit: 'false'

      - name: Push if changed
        run: |
          MAX_RETRIES=3
          for i in $(seq 1 $MAX_RETRIES); do
            git pull --rebase 2>&1 || true
            if git push 2>&1; then
              echo "Push succeeded on attempt $i"
              exit 0
            fi
            echo "::warning::git push failed (attempt $i/$MAX_RETRIES)"
            sleep $((i * 5))
          done

          echo "::error::git push failed after $MAX_RETRIES attempts"
          exit 1
