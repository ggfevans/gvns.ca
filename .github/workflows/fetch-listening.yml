name: Fetch Listening Data

on:
  schedule:
    - cron: "17 2 * * *" # Daily at 02:17 UTC (off-peak)
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ secrets.GH_PAT }}

      # listenbrainz-json-bourne commits the data file itself when
      # skip_commit is 'false'. The composite action below detects the
      # local commit via `git rev-list origin/main..HEAD` and routes it
      # through a PR.
      - name: Fetch ListenBrainz data
        uses: ggfevans/listenbrainz-json-bourne@4fb09726f8311185cc651cb41b480a6c7424009d # v3.1.0
        with:
          username: ${{ secrets.LISTENBRAINZ_USERNAME }}
          output_path: src/data/listening.json
          stats_range: this_month
          top_count: "10"
          recent_count: "10"
          skip_commit: "false"

      - uses: ./.github/actions/commit-via-pr
        with:
          commit-message: "chore: update listening data"
          branch-prefix: update-listening
          github-token: ${{ secrets.GH_PAT }}
