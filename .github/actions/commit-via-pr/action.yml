name: 'Commit via PR'
description: >-
  Stage data changes on a temp branch, open a PR, and enable auto-merge once
  required status checks pass. Designed for scheduled "fetch-and-commit"
  workflows that target a protected `main` branch.

inputs:
  paths:
    description: >-
      Files or directories to stage, newline-separated. Optional — leave empty
      if a previous step has already committed the changes.
    required: false
    default: ''
  commit-message:
    description: 'Commit message (also used as the PR title).'
    required: true
  branch-prefix:
    description: >-
      Prefix for the temp branch name. The branch will be
      `auto/<prefix>-<run_id>` to guarantee uniqueness across concurrent runs.
    required: true
  pr-body:
    description: 'PR description.'
    required: false
    default: 'Automated update.'
  github-token:
    description: >-
      Token used for `git push`, `gh pr create`, and `gh pr merge`. The
      default `GITHUB_TOKEN` works (auto-merge isn't used and required
      status checks were removed on `main` — see #263); a PAT is only
      needed if downstream workflows must fire from the resulting PR.
    required: true

runs:
  using: 'composite'
  steps:
    - name: Configure git identity and auth
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        # Set up git to authenticate with the input token via gh's credential
        # helper. Lets callers pass `persist-credentials: false` to checkout so
        # the token isn't readable by intervening third-party action steps.
        gh auth setup-git

    - name: Stage and commit local changes
      shell: bash
      env:
        INPUT_PATHS: ${{ inputs.paths }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
      run: |
        if [ -n "$INPUT_PATHS" ]; then
          while IFS= read -r path; do
            [ -z "$path" ] && continue
            git add "$path"
          done <<< "$INPUT_PATHS"
        fi

        if ! git diff --staged --quiet; then
          git commit -m "$COMMIT_MESSAGE"
        fi

    - name: Check whether HEAD is ahead of origin/main
      id: ahead
      shell: bash
      run: |
        git fetch origin main --quiet
        AHEAD=$(git rev-list --count origin/main..HEAD)
        echo "count=$AHEAD" >> "$GITHUB_OUTPUT"
        if [ "$AHEAD" -eq 0 ]; then
          echo "No new commits relative to origin/main — nothing to push."
        else
          echo "$AHEAD commit(s) ahead of origin/main."
        fi

    - name: Push branch, open PR, enable auto-merge
      if: steps.ahead.outputs.count != '0'
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        BRANCH_PREFIX: ${{ inputs.branch-prefix }}
        COMMIT_MESSAGE: ${{ inputs.commit-message }}
        PR_BODY: ${{ inputs.pr-body }}
      run: |
        BRANCH="auto/${BRANCH_PREFIX}-${GITHUB_RUN_ID}"
        git checkout -b "$BRANCH"

        if ! git push origin "$BRANCH"; then
          echo "::error::Failed to push branch $BRANCH"
          exit 1
        fi

        if ! gh pr create \
          --base main \
          --head "$BRANCH" \
          --title "$COMMIT_MESSAGE" \
          --body "$PR_BODY"; then
          echo "::error::Failed to create PR for $BRANCH"
          exit 1
        fi

        # Immediate merge: enablePullRequestAutoMerge requires a
        # required_status_checks rule on main, which we removed (#263 — it
        # blocked Sveltia's direct CMS commits, see docs/CMS-SETUP.md).
        # Workers Builds runs after merge; failed builds simply don't deploy.
        gh pr merge "$BRANCH" --squash --delete-branch

