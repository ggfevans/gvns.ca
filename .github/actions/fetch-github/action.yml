name: 'Fetch GitHub'
description: 'Fetch GitHub profile data (contributions, heatmap, streak, activity, repos) as clean JSON'
author: 'ggfevans'

branding:
  icon: 'activity'
  color: 'purple'

inputs:
  username:
    description: 'GitHub username to fetch data for'
    required: false
    default: '${{ github.repository_owner }}'
  token:
    description: 'GitHub token (PAT for private contributions, or GITHUB_TOKEN for public only)'
    required: false
    default: '${{ github.token }}'
  output-path:
    description: 'Path to write the JSON output file'
    required: false
    default: 'github.json'
  max-repos:
    description: 'Maximum number of repositories to include'
    required: false
    default: '12'
  max-activities:
    description: 'Maximum number of recent activities to include'
    required: false
    default: '30'
  max-pages:
    description: 'Maximum event pages to scan when collecting recent activity'
    required: false
    default: '3'

outputs:
  json-path:
    description: 'Path to the generated JSON file'
    value: ${{ steps.run-fetcher.outputs.json-path }}
  last-updated:
    description: 'ISO timestamp of when data was fetched'
    value: ${{ steps.run-fetcher.outputs.last-updated }}

runs:
  using: 'composite'
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '25'

    - name: Install action dependencies
      shell: bash
      working-directory: ${{ github.action_path }}
      run: npm ci

    - name: Run fetcher
      id: run-fetcher
      shell: bash
      env:
        # POSIX-legal env-var names only (bash + GitHub Actions friendly).
        # entrypoint.js then maps the underscore-named values to the hyphenated
        # names @actions/core.getInput expects, without modifying index.js.
        INPUT_USERNAME: ${{ inputs.username }}
        INPUT_TOKEN: ${{ inputs.token }}
        INPUT_OUTPUT_PATH: ${{ inputs.output-path }}
        INPUT_MAX_REPOS: ${{ inputs.max-repos }}
        INPUT_MAX_ACTIVITIES: ${{ inputs.max-activities }}
        INPUT_MAX_PAGES: ${{ inputs.max-pages }}
      run: node ${{ github.action_path }}/src/entrypoint.js
