backend:
  name: github
  repo: ggfevans/gvns.ca
  branch: main
  base_url: https://auth.gvns.ca
  auth_endpoint: auth

site_url: https://gvns.ca
display_url: https://gvns.ca

# Media uploads land in /public/uploads/ and are referenced by absolute URL
# in frontmatter (e.g. heroImage: /uploads/foo.jpg). This sidesteps Sveltia's
# entry-relative media-folder resolution, which always nests uploads under a
# slug-named subfolder for `path: "{{year}}/{{month}}/{{slug}}"` collections
# (see issue #264). Trade-off: hero images bypass Astro's image() pipeline
# (no per-image optimisation), but the config is robust and predictable.
media_folder: public/uploads
public_folder: /uploads

# Client-side image optimisation: Sveltia converts raster uploads to WebP
# at quality 85 and resizes to max 2048px (long edge) before commit. This
# mitigates the loss of Astro's image() pipeline for heroes (#264) — large
# phone JPEGs land already-compressed. SVGs untouched. Per-field overrides
# can be added later if needed.
# Source: https://github.com/sveltia/sveltia-cms (media-libraries integration)
media_libraries:
  default:
    config:
      # Slugify upload filenames so frontmatter doesn't end up with
      # URL-encoded paths (e.g. "No Ragrets.png" → "no-ragrets.png"
      # instead of "No%20Ragrets.png"). Sveltia defaults to false;
      # canonical fix per upstream #422 / ADR-014.
      slugify_filename: true
      transformations:
        raster_image:
          format: webp
          quality: 85
          width: 2048
          height: 2048

collections:
  - name: posts
    label: Posts
    label_singular: Post
    folder: src/content/posts
    path: "{{year}}/{{month}}/{{slug}}"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    editor:
      preview: false
    fields:
      - {
          name: title,
          label: Title,
          widget: string,
          required: true,
          pattern: ["^.{1,100}$", "Max 100 characters"],
        }
      - {
          name: description,
          label: Description,
          widget: text,
          required: true,
          pattern: ['^[\s\S]{1,200}$', "Max 200 characters"],
        }
      - {
          name: pubDate,
          label: Publish date,
          widget: datetime,
          format: "YYYY-MM-DD",
          date_format: "YYYY-MM-DD",
          time_format: false,
          required: true,
          default: "",
        }
      - name: tags
        label: Tags
        widget: select
        multiple: true
        min: 1
        max: 4
        options:
          - homelab
          - docker
          - linux
          - networking
          - automation
          - web-dev
          - bjj
          - movement
          - training
          - adhd
          - productivity
          - pkm
          - essay
          - tutorial
          - til
          - meta
      - {
          name: updatedDate,
          label: Updated date,
          widget: datetime,
          format: "YYYY-MM-DD",
          date_format: "YYYY-MM-DD",
          time_format: false,
          required: false,
        }
      - { name: draft, label: Draft, widget: boolean, default: false }
      - {
          name: heroImage,
          label: Hero image,
          widget: image,
          required: false,
          choose_url: false,
        }
      - {
          name: heroImageAlt,
          label: Hero image alt text,
          widget: string,
          required: false,
          hint: "Describe the image for screen readers + social previews. Leave blank if purely decorative.",
        }
      - {
          name: canonicalUrl,
          label: Canonical URL,
          widget: string,
          required: false,
          hint: "Full URL of the original post if cross-published (validated at build by Zod).",
        }
      - { name: body, label: Body, widget: markdown }
