backend:
  name: github
  repo: ggfevans/gvns.ca
  branch: main
  base_url: https://auth.gvns.ca
  auth_endpoint: auth

site_url: https://gvns.ca
display_url: https://gvns.ca

# No top-level media_folder/public_folder. Posts use bundle layout
# (`<...>/<slug>/index.md`), so Sveltia's default entry-relative resolution
# co-locates uploaded media with the post that references it. The bare
# `![](file.webp)` refs Sveltia writes resolve correctly because post and
# assets share the same directory. heroImage frontmatter is also a bare
# basename, validated through Astro's image() schema. See ADR-015.

# Client-side image optimisation: Sveltia converts raster uploads to WebP
# at quality 85 and resizes to max 2048px (long edge) before commit. Applies
# globally to all uploads regardless of where they land. SVGs untouched.
# Source: https://github.com/sveltia/sveltia-cms (media-libraries integration)
media_libraries:
  default:
    config:
      # Slugify upload filenames so frontmatter doesn't end up with
      # URL-encoded paths (e.g. "No Ragrets.png" → "no-ragrets.png"
      # instead of "No%20Ragrets.png"). Sveltia defaults to false;
      # canonical fix per upstream #422 / ADR-014.
      slugify_filename: true
      transformations:
        raster_image:
          format: webp
          quality: 85
          width: 2048
          height: 2048

collections:
  - name: posts
    label: Posts
    label_singular: Post
    folder: src/content/posts
    path: "{{year}}/{{month}}/{{slug}}/index"
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    editor:
      preview: false
    fields:
      - {
          name: title,
          label: Title,
          widget: string,
          required: true,
          pattern: ["^.{1,100}$", "Max 100 characters"],
        }
      - {
          name: description,
          label: Description,
          widget: text,
          required: true,
          pattern: ['^[\s\S]{1,200}$', "Max 200 characters"],
        }
      - {
          name: pubDate,
          label: Publish date,
          widget: datetime,
          format: "YYYY-MM-DD",
          date_format: "YYYY-MM-DD",
          time_format: false,
          required: true,
          default: "",
        }
      - name: tags
        label: Tags
        widget: select
        multiple: true
        min: 1
        max: 4
        options:
          - homelab
          - docker
          - linux
          - networking
          - automation
          - web-dev
          - bjj
          - movement
          - training
          - adhd
          - productivity
          - pkm
          - essay
          - tutorial
          - til
          - meta
      - {
          name: updatedDate,
          label: Updated date,
          widget: datetime,
          format: "YYYY-MM-DD",
          date_format: "YYYY-MM-DD",
          time_format: false,
          required: false,
        }
      - { name: draft, label: Draft, widget: boolean, default: false }
      - {
          name: heroImage,
          label: Hero image,
          widget: image,
          required: false,
          choose_url: false,
        }
      - {
          name: heroImageAlt,
          label: Hero image alt text,
          widget: string,
          required: false,
          pattern: ['^.{0,250}$', "Keep alt text under 250 characters."],
          hint: "Describe the image for screen readers + social previews (max 250 chars). Leave blank if purely decorative.",
        }
      - {
          name: canonicalUrl,
          label: Canonical URL,
          widget: string,
          required: false,
          hint: "Full URL of the original post if cross-published (validated at build by Zod).",
        }
      - { name: body, label: Body, widget: markdown }
